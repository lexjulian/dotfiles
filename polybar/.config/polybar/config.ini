[colors]
background = ${colors.base}
background-alt = ${colors.blue}
foreground = ${colors.text}
primary = ${colors.mauve}
secondary = ${colors.mantle}
alert = ${colors.red}
disabled = ${colors.subtext1}

[bar/toph]
monitor = ${env:MONITOR:}
width = 100%
height = 28pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

bottom = true

line-size = 6pt

#border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.flamingo}

font-0 = MesloLGS Nerd Font Mono:size=15;6
font-1 = Noto Color Emoji:pixelsize=8;1:format=truetype:scale=6:antialias=true;5

modules-left = xworkspaces xwindow mymodule 
modules-right = mymodule2 pulseaudio battery memory cpu wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.mauve}
label-active-foreground = ${colors.crust}
label-active-underline= ${colors.lauve}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/mymodule]
type = custom/text
format = <label>
format-background = #3d348b
format-foreground = #fff
format-padding = 1
label = "It's hard to beat a person who never gives up.тАЭ - Babe Ruth

[module/mymodule2]
type = internal/memory
interval = 3
format-prefix = "Mood Meter: "
format-prefix-foreground = ${colors.primary}
format = <ramp-used>
ramp-used-0 = ЁЯШИ
ramp-used-1 = ЁЯШГ
ramp-used-2 = ЁЯШК
ramp-used-3 = ЁЯШб
ramp-used-4 = ЁЯШИ
ramp-used-5 = ЁЯШ▒
ramp-used-6 = ЁЯТй
ramp-used-7 = ЁЯе╡


; [module/xwindow]
; type = internal/xwindow
; label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
;format-volume = <label-volume>
format-volume = ЁЯФИ

;label-volume = %percentage%%

label-muted = ЁЯФЗ muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

; [module/memory]
; type = internal/memory
; interval = 2
; format-prefix = "RAM "
; format-prefix-foreground = ${colors.primary}
; label = %percentage_used:2%%
;
; [module/cpu]
; type = internal/cpu
; interval = 2
; format-prefix = "CPU "
; format-prefix-foreground = ${colors.primary}
; label = %percentage:2%%

[module/battery]
type = internal/battery
format-prefix = "BAT "
format-prefix-foreground = ${colors.primary}
full-at = 99
format-charging = <animation-charging> <label-charging>
format-full-prefix = "BAT "
format-full-foreground = ${colors.primary}
animation-charging-0 = BAT 
animation-charging-1 =BAT 
animation-charging-2 =BAT 
animation-charging-3 =BAT 
animation-charging-4 =BAT 
animation-charging-0-foreground = ${colors.primary}
animation-charging-1-foreground = ${colors.primary}
animation-charging-2-foreground = ${colors.primary}
animation-charging-3-foreground = ${colors.primary}
animation-charging-4-foreground = ${colors.primary}

; Framerate in milliseconds
animation-charging-framerate = 750
animation-charging-foreground = ${colors.peach}
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = BAT
ramp-capacity-1 =BAT 
ramp-capacity-2 =BAT 
ramp-capacity-3 = BAT
ramp-capacity-4 = BAT
ramp-capacity-0-foreground = ${colors.primary}
ramp-capacity-1-foreground = ${colors.primary}
ramp-capacity-2-foreground = ${colors.primary}
ramp-capacity-3-foreground = ${colors.primary}
ramp-capacity-4-foreground = ${colors.primary}
low-at = 5
battery = BAT0
adapter = ACAD
poll-interval = 5

[module/date]
type = internal/date
interval = 1

format =  <label>
format-background = #e63946
format-foreground = #fff
format-padding = 1

date = %a %b %d %I:%M
label = %date%

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
